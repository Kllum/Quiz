<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
    box-sizing:border-box;
    transition: background 0.8s ease;
}
.container{
    width:90%;
    max-width:500px;
    text-align:center;
    animation:fade .6s;
}
h2{
    font-size:1.3rem;
    line-height:1.7;
    margin-bottom:2rem;
    font-weight:400;
}
button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}
button:hover{ background:#334155; }
@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="container" id="tela"></div>

<script>

const mapsLink = "https://maps.app.goo.gl/SfseKGpdZnoTyPi68";

const cores = [
  "#0f172a",
  "#101d35",
  "#112340",
  "#13294b",
  "#142f57",
  "#153562",
  "#163b6d",
  "#184178",
  "#194783",
  "#1a4d8f"
];

const paginas = [
  {
    texto: "Às vezes surgem momentos que podem ser explorados ou apenas observados.\n\nPode seguir por curiosidade, sem pressa, ou parar a qualquer momento — tudo certo.",
    opcoes: [
      { t: "Continuar", acao: "proximo" },
      { t: "Parar",     acao: "parar"   }
    ]
  },
  {
    texto: "Algo inesperado acontece.",
    opcoes: [
      { t: "Rio da situação",                  acao: "proximo" },
      { t: "Observo antes de agir",           acao: "proximo" },
      { t: "Preciso de tempo para processar", acao: "proximo" },
      { t: "Depende do dia",                  acao: "proximo" }
    ]
  },
  {
    texto: "Ao decidir, costumo seguir mais pelo:",
    opcoes: [
      { t: "Impulso",    acao: "proximo" },
      { t: "Lógica",     acao: "proximo" },
      { t: "Sentimento", acao: "proximo" },
      { t: "Equilíbrio", acao: "proximo" }
    ]
  },
  {
    texto: "Conexões surgem de forma inesperada.",
    opcoes: [
      { t: "Aproveito oportunidades",    acao: "proximo" },
      { t: "Analiso primeiro",           acao: "proximo" },
      { t: "Protejo o que já construiu", acao: "proximo" },
      { t: "Deixo o tempo decidir",      acao: "proximo" }
    ]
  },
  {
    texto: "Algo desperta curiosidade.",
    opcoes: [
      { t: "Ignoro",                acao: "proximo" },
      { t: "Observo de longe",      acao: "proximo" },
      { t: "Experimento um pouco",  acao: "proximo" },
      { t: "Exploro", acao: "proximo" }
    ]
  },
  {
    texto: "Crescer às vezes significa:",
    opcoes: [
      { t: "Manter escolhas feitas", acao: "proximo" },
      { t: "Revisitar caminhos",     acao: "proximo" },
      { t: "Criar novos espaços",    acao: "proximo" },
      { t: "Descobrir sem pressa",   acao: "proximo" }
    ]
  },
  {
    texto: "Mudanças importantes precisam ser grandes:",
    opcoes: [
      { t: "Sim",                         acao: "proximo" },
      { t: "Não, pequenos passos bastam", acao: "proximo" },
      { t: "Depende",                     acao: "proximo" },
      { t: "Nunca pensei nisso",          acao: "proximo" }
    ]
  },
  {
    texto: "Se algo despertasse curiosidade hoje, eu:",
    opcoes: [
      { t: "Deixo espaço",     acao: "proximo" },
      { t: "Observo",     acao: "proximo" },
      { t: "Converso um pouco", acao: "proximo" },
      { t: "Descubro no mundo real",      acao: "proximo" }
    ]
  },
  {
    texto: "Algumas histórias não pedem respostas imediatas, apenas um começo. Faz sentido:",
    opcoes: [
      { t: "Observar",     acao: "proximo" },
      { t: "Explorar",  acao: "proximo" },
      { t: "Deixar fluir", acao: "proximo" },
      { t: "Deixar pra lá",     acao: "proximo" }
    ]
  },
  {
    texto: "Sem promessas ou definições. Apenas um primeiro passo.\n\nVocê gostaria de me encontrar?",
    opcoes: [
      { t: "Sim",       acao: "resultado_sim"       },
      { t: "Outro dia", acao: "resultado_outro_dia" },
      { t: "Talvez",    acao: "resultado_talvez"    },
      { t: "Não",       acao: "resultado_nao"       }
    ]
  }
];

let paginaAtual = 0;

function atualizarCor(indice){
  document.body.style.background = cores[Math.min(indice, cores.length - 1)];
}

function mostrar(pagina, indice){
  atualizarCor(indice);
  const tela = document.getElementById("tela");
  tela.innerHTML = "";
  const h2 = document.createElement("h2");
  h2.style.whiteSpace = "pre-line";
  h2.innerText = pagina.texto;
  tela.appendChild(h2);
  pagina.opcoes.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt.t;
    btn.onclick = () => executar(opt.acao);
    tela.appendChild(btn);
  });
}

function executar(acao){
  if(acao === "proximo"){
    paginaAtual++;
    mostrar(paginas[paginaAtual], paginaAtual);
  } else if(acao === "parar"){
    window.close();
  } else if(acao === "resultado_sim"){
    mostrarResultado("Então começamos por aqui.", "Descobrir", "Aceitou o encontro — Sim");
  } else if(acao === "resultado_outro_dia"){
    mostrarResultado("O tempo também sabe encontrar caminhos.", "Descobrir", "Aceitou o encontro — Outro dia");
  } else if(acao === "resultado_talvez"){
    atualizarCor(cores.length - 1);
    document.getElementById("tela").innerHTML = `<h2>Sem pressa, pequenos passos têm seu próprio tempo.</h2>`;
  } else if(acao === "resultado_nao"){
    atualizarCor(cores.length - 1);
    document.getElementById("tela").innerHTML = `<h2>Um último QR permanece à disposição, sem pressa ou obrigação.</h2>`;
  }
}

function mostrarResultado(mensagem, textoBotao, emailMsg){
  atualizarCor(cores.length - 1);
  const tela = document.getElementById("tela");
  tela.innerHTML = "";
  const h2 = document.createElement("h2");
  h2.innerText = mensagem;
  tela.appendChild(h2);
  const btn = document.createElement("button");
  btn.innerText = textoBotao;
  btn.onclick = () => {
    window.open(mapsLink, "_blank");
    enviarNotificacao(emailMsg);
  };
  tela.appendChild(btn);
}

function enviarNotificacao(msg){
  const url = "https://docs.google.com/forms/d/e/1FAIpQLSdwhlo8fdEGi7vjCGlY2FeBCBfhYdnQjgGCLKFCGgceTNnjGw/formResponse";
  const body = new FormData();
  body.append("entry.1196602189", msg);
  fetch(url, { method:"POST", mode:"no-cors", body });
}

mostrar(paginas[0], 0);

</script>
</body>
</html>
